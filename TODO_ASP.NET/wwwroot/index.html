<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplicație TODO simplă construită cu ASP.NET Core - Temă ASO">
    <title>TODO App — ASP.NET Core</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ======= RESET & BASE ======= */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(30, 30, 55, 0.7);
            --bg-input: rgba(255, 255, 255, 0.06);
            --text-primary: #e8e8f0;
            --text-secondary: #9090b0;
            --text-muted: #606080;
            --accent: #7c5cfc;
            --accent-light: #9d85fd;
            --accent-glow: rgba(124, 92, 252, 0.25);
            --success: #34d399;
            --success-glow: rgba(52, 211, 153, 0.2);
            --danger: #f87171;
            --danger-glow: rgba(248, 113, 113, 0.15);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --radius: 14px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Background gradient orbs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: -1;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #7c5cfc, transparent 70%);
            top: -100px;
            right: -100px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #34d399, transparent 70%);
            bottom: -80px;
            left: -80px;
            opacity: 0.2;
        }

        /* ======= LAYOUT ======= */
        .app-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        /* ======= HEADER ======= */
        .app-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .app-header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-light), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .app-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 400;
        }

        .app-header .badge {
            display: inline-block;
            background: var(--accent-glow);
            color: var(--accent-light);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 10px;
            border: 1px solid rgba(124, 92, 252, 0.2);
        }

        /* ======= STATS BAR ======= */
        .stats-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }

        .stat-card {
            flex: 1;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: center;
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .stat-card .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-card .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .stat-card.accent .stat-value { color: var(--accent-light); }
        .stat-card.success .stat-value { color: var(--success); }
        .stat-card.danger .stat-value { color: var(--danger); }

        /* ======= ADD FORM ======= */
        .add-form {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 28px;
            box-shadow: var(--shadow);
        }

        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .form-row:last-child {
            margin-bottom: 0;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.92rem;
            transition: var(--transition);
            outline: none;
            resize: vertical;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn-add {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent), #6844e8);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.3px;
        }

        .btn-add:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px var(--accent-glow);
        }

        .btn-add:active {
            transform: translateY(0);
        }

        /* ======= FILTER TABS ======= */
        .filter-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 4px;
            border: 1px solid var(--border);
        }

        .filter-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-tab:hover {
            color: var(--text-secondary);
        }

        .filter-tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 12px var(--accent-glow);
        }

        /* ======= TODO LIST ======= */
        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .todo-item {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            transition: var(--transition);
            animation: slideIn 0.35s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .todo-item:hover {
            border-color: var(--border-hover);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .todo-item.completed {
            opacity: 0.55;
        }

        .todo-item.completed .todo-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* Custom checkbox */
        .todo-checkbox {
            position: relative;
            width: 24px;
            height: 24px;
            min-width: 24px;
            margin-top: 2px;
            cursor: pointer;
        }

        .todo-checkbox input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 1;
        }

        .todo-checkbox .checkmark {
            width: 24px;
            height: 24px;
            border: 2px solid var(--text-muted);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .todo-checkbox input:checked + .checkmark {
            background: var(--success);
            border-color: var(--success);
        }

        .todo-checkbox input:checked + .checkmark::after {
            content: '✓';
            color: #fff;
            font-size: 14px;
            font-weight: 700;
        }

        .todo-content {
            flex: 1;
            min-width: 0;
        }

        .todo-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 3px;
            word-break: break-word;
        }

        .todo-description {
            font-size: 0.85rem;
            color: var(--text-secondary);
            word-break: break-word;
        }

        .todo-date {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .todo-actions {
            display: flex;
            gap: 6px;
            margin-top: 2px;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            border: 1px solid var(--border);
            background: transparent;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: var(--transition);
        }

        .btn-icon.delete:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: var(--danger-glow);
        }

        .btn-icon.edit:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            background: var(--accent-glow);
        }

        /* ======= EMPTY STATE ======= */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 14px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        /* ======= TOAST NOTIFICATION ======= */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 22px;
            color: var(--text-primary);
            font-size: 0.9rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transform: translateY(100px);
            opacity: 0;
            transition: var(--transition);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }

        /* ======= RESPONSIVE ======= */
        @media (max-width: 600px) {
            .app-header h1 { font-size: 1.8rem; }
            .stats-bar { flex-direction: column; }
            .form-row { flex-direction: column; }
            .app-container { padding: 24px 16px 40px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>📋 TODO App</h1>
            <p>Aplicație simplă TODO — ASP.NET Core Web API</p>
            <span class="badge">ASO — Temă Obligatorie</span>
        </header>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card accent">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card success">
                <div class="stat-value" id="stat-done">0</div>
                <div class="stat-label">Completate</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-value" id="stat-pending">0</div>
                <div class="stat-label">În așteptare</div>
            </div>
        </div>

        <!-- Add Form -->
        <form class="add-form" id="add-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="input-title">Titlu</label>
                    <input type="text" id="input-title" placeholder="Ce trebuie să faci?" required autocomplete="off">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="input-description">Descriere (opțional)</label>
                    <textarea id="input-description" rows="2" placeholder="Adaugă detalii suplimentare..."></textarea>
                </div>
            </div>
            <div class="form-row">
                <button type="submit" class="btn-add" id="btn-submit">＋ Adaugă Task</button>
            </div>
        </form>

        <!-- Filters -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">Toate</button>
            <button class="filter-tab" data-filter="pending">În așteptare</button>
            <button class="filter-tab" data-filter="completed">Completate</button>
        </div>

        <!-- Todo List -->
        <div class="todo-list" id="todo-list"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const API_URL = '/api/TodoItems';
        let todos = [];
        let currentFilter = 'all';
        let editingId = null;

        // ——— DOM refs ———
        const form = document.getElementById('add-form');
        const inputTitle = document.getElementById('input-title');
        const inputDesc = document.getElementById('input-description');
        const btnSubmit = document.getElementById('btn-submit');
        const todoList = document.getElementById('todo-list');
        const toastEl = document.getElementById('toast');

        // ——— Init ———
        document.addEventListener('DOMContentLoaded', loadTodos);

        // ——— Filter tabs ———
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelector('.filter-tab.active').classList.remove('active');
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderTodos();
            });
        });

        // ——— Form submit ———
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = inputTitle.value.trim();
            if (!title) return;

            const description = inputDesc.value.trim();

            if (editingId !== null) {
                // Update existing
                const existing = todos.find(t => t.id === editingId);
                if (!existing) return;
                const updated = { ...existing, title, description };
                await updateTodo(updated);
                editingId = null;
                btnSubmit.textContent = '＋ Adaugă Task';
            } else {
                // Create new
                await createTodo({ title, description, isCompleted: false });
            }

            inputTitle.value = '';
            inputDesc.value = '';
            inputTitle.focus();
        });

        // ——— API calls ———
        async function loadTodos() {
            try {
                const res = await fetch(API_URL);
                todos = await res.json();
                renderTodos();
                updateStats();
            } catch (err) {
                showToast('Eroare la încărcarea task-urilor', 'error');
            }
        }

        async function createTodo(todo) {
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(todo)
                });
                const created = await res.json();
                todos.unshift(created);
                renderTodos();
                updateStats();
                showToast('Task adăugat cu succes!', 'success');
            } catch (err) {
                showToast('Eroare la adăugarea task-ului', 'error');
            }
        }

        async function updateTodo(todo) {
            try {
                await fetch(`${API_URL}/${todo.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(todo)
                });
                const idx = todos.findIndex(t => t.id === todo.id);
                if (idx !== -1) todos[idx] = todo;
                renderTodos();
                updateStats();
                showToast('Task actualizat!', 'success');
            } catch (err) {
                showToast('Eroare la actualizarea task-ului', 'error');
            }
        }

        async function deleteTodo(id) {
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                todos = todos.filter(t => t.id !== id);
                renderTodos();
                updateStats();
                showToast('Task șters!', 'success');
            } catch (err) {
                showToast('Eroare la ștergerea task-ului', 'error');
            }
        }

        async function toggleComplete(id) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;
            todo.isCompleted = !todo.isCompleted;
            await updateTodo(todo);
        }

        // ——— Render ———
        function renderTodos() {
            const filtered = todos.filter(t => {
                if (currentFilter === 'pending') return !t.isCompleted;
                if (currentFilter === 'completed') return t.isCompleted;
                return true;
            });

            if (filtered.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <p>${currentFilter === 'all'
                            ? 'Niciun task încă. Adaugă primul tău task!'
                            : 'Niciun task în această categorie.'}</p>
                    </div>`;
                return;
            }

            todoList.innerHTML = filtered.map(todo => `
                <div class="todo-item ${todo.isCompleted ? 'completed' : ''}" id="todo-${todo.id}">
                    <label class="todo-checkbox">
                        <input type="checkbox" ${todo.isCompleted ? 'checked' : ''}
                               onchange="toggleComplete(${todo.id})">
                        <span class="checkmark"></span>
                    </label>
                    <div class="todo-content">
                        <div class="todo-title">${escapeHtml(todo.title)}</div>
                        ${todo.description
                            ? `<div class="todo-description">${escapeHtml(todo.description)}</div>`
                            : ''}
                        <div class="todo-date">Creat: ${formatDate(todo.createdAt)}</div>
                    </div>
                    <div class="todo-actions">
                        <button class="btn-icon edit" onclick="editTodo(${todo.id})" title="Editează">✏️</button>
                        <button class="btn-icon delete" onclick="deleteTodo(${todo.id})" title="Șterge">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function editTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;
            editingId = id;
            inputTitle.value = todo.title || '';
            inputDesc.value = todo.description || '';
            btnSubmit.textContent = '✓ Salvează Modificările';
            inputTitle.focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateStats() {
            const total = todos.length;
            const done = todos.filter(t => t.isCompleted).length;
            const pending = total - done;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-done').textContent = done;
            document.getElementById('stat-pending').textContent = pending;
        }

        // ——— Helpers ———
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('ro-RO', {
                day: '2-digit', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        let toastTimeout;
        function showToast(msg, type = 'success') {
            toastEl.textContent = msg;
            toastEl.className = `toast ${type} show`;
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toastEl.classList.remove('show');
            }, 2500);
        }
    </script>
</body>
</html>
